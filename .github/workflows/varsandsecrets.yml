name: Docker build and deploy
on: 
  push:
     branches:
        - main
env:
    IMAGE_NAME: github-actions-nginx

jobs:
    docker-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
              
            - name: Login to Docker hub
              uses: docker/login-action@v4
              with:
                    username: ${{ secrets.DOCKER_USERNAME }}
                    password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build docker image
              run: docker build -t ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:latest .

            - name: Push Docker image
              run: docker push ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:latest

    docker-deploy:
        needs: docker-build
        runs-on: ubuntu-latest
        steps:
             - name: Login to Docker hub
               uses: docker/login-action@v4
               with:
                    username: ${{ secrets.DOCKER_USERNAME }}
                    password: ${{ secrets.DOCKER_PASSWORD }}
             - name: Docker pull image
               run: docker pull ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:latest
             - name: Test the image
               run: ls -ltr 
             - name: docker run image
               run: docker run -d -p 8080:80 ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:latest
             - name: Check running containers
               run: docker ps -a
             - name: Test the image
               run: curl http://localhost:8080